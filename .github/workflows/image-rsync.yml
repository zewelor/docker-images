name: Build rsync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'rsync/**'
      - '!**/*.md'
      - '!**/justfile'
  push:
    branches:
      - main
      - 'renovate/**'
    paths:
      - 'rsync/**'
      - '!**/*.md'
      - '!**/justfile'

jobs:
  alpine_version:
    name: Resolve Alpine version
    uses: ./.github/workflows/reusable-alpine-version.yml

  build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: alpine_version
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: rsync
      alpine_version: ${{ needs.alpine_version.outputs.alpine_version }}
      publish: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
