name: Build rsync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'rsync/**'
      - '!**/*.md'
      - '!**/Justfile'
  push:
    branches:
      - main
      - 'renovate/**'
    paths:
      - 'rsync/**'
      - '!**/*.md'
      - '!**/Justfile'

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: rsync
      publish: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
