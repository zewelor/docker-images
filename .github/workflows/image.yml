name: Build all images

on:
  workflow_dispatch:
    inputs:
      use_cache:
        description: Use Docker cache
        type: boolean
        default: true
  pull_request:
    types: [opened, synchronize, reopened]
    paths: &workflow_paths
      - '.github/workflows/**'
  push:
    branches:
      - main
      - 'renovate/**'
    paths: *workflow_paths
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  DOCKER_BUILD_CHECKS_ANNOTATIONS: false

jobs:
  alpine:
    name: Build ${{ matrix.image_name }}
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - nut
          - rsync
          - sqlite3
          - tftp
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: ${{ matrix.image_name }}
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit

  ruby:
    name: Build ruby
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/reusable-ruby-image.yml
    with:
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit

  debian:
    name: Build nvim
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/reusable-debian-image.yml
    with:
      image_name: nvim
      debian_tag: trixie-debian13
      release_tag: '13'
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit
