name: Build all images

on:
  workflow_dispatch:
    inputs:
      use_cache:
        description: 'Use Docker cache'
        type: boolean
        default: true
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/**'
  push:
    branches:
      - main
      - 'renovate/**'
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '0 0 * * 0'

env:
  DOCKER_BUILD_CHECKS_ANNOTATIONS: false

jobs:
  alpine_version:
    name: Resolve Alpine version
    uses: ./.github/workflows/reusable-alpine-version.yml

  alpine:
    name: Build ${{ matrix.image_name }}
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: alpine_version
    strategy:
      fail-fast: false
      matrix:
        image_name: [rsync, tftp, sqlite3]
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: ${{ matrix.image_name }}
      alpine_version: ${{ needs.alpine_version.outputs.alpine_version }}
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit

  ruby:
    name: Build ruby
    uses: ./.github/workflows/reusable-ruby-image.yml
    with:
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit

  debian:
    name: Build nvim
    uses: ./.github/workflows/reusable-debian-image.yml
    with:
      image_name: nvim
      debian_tag: trixie-debian13
      release_tag: '13'
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit
