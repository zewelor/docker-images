name: Build all images

on:
  workflow_dispatch:
    inputs:
      use_cache:
        description: 'Use Docker cache'
        type: boolean
        default: true
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - 'renovate/**'
  schedule:
    - cron: '0 0 * * 0'

permissions: {}

env:
  DOCKER_BUILD_CHECKS_ANNOTATIONS: false

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      alpine_images: ${{ steps.set-matrix.outputs.alpine_images }}
      build_ruby: ${{ steps.set-matrix.outputs.build_ruby }}
      build_debian: ${{ steps.set-matrix.outputs.build_debian }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            rsync:
              - 'rsync/**'
              - '!rsync/**/*.md'
              - '!rsync/**/justfile'
            tftp:
              - 'tftp/**'
              - '!tftp/**/*.md'
              - '!tftp/**/justfile'
            sqlite3:
              - 'sqlite3/**'
              - '!sqlite3/**/*.md'
              - '!sqlite3/**/justfile'
            nut:
              - 'nut/**'
              - '!nut/**/*.md'
              - '!nut/**/justfile'
            ruby:
              - 'ruby/**'
              - '!ruby/**/*.md'
              - '!ruby/**/justfile'
            nvim:
              - 'nvim/**'
              - '!nvim/**/*.md'
              - '!nvim/**/justfile'
      - name: Generate matrix
        id: set-matrix
        run: |
          BUILD_ALL="false"
          if [ "${{ github.event_name }}" = "schedule" ] || \
             [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ steps.filter.outputs.workflows }}" = "true" ]; then
            BUILD_ALL="true"
          fi
          
          IMAGES=()
          if [ "$BUILD_ALL" = "true" ] || [ "${{ steps.filter.outputs.rsync }}" = "true" ]; then IMAGES+=("rsync"); fi
          if [ "$BUILD_ALL" = "true" ] || [ "${{ steps.filter.outputs.tftp }}" = "true" ]; then IMAGES+=("tftp"); fi
          if [ "$BUILD_ALL" = "true" ] || [ "${{ steps.filter.outputs.sqlite3 }}" = "true" ]; then IMAGES+=("sqlite3"); fi
          if [ "$BUILD_ALL" = "true" ] || [ "${{ steps.filter.outputs.nut }}" = "true" ]; then IMAGES+=("nut"); fi
          
          JSON_IMAGES=$(jq --compact-output --null-input '$ARGS.positional' --args "${IMAGES[@]}")
          echo "alpine_images=$JSON_IMAGES" >> "$GITHUB_OUTPUT"
          
          if [ "$BUILD_ALL" = "true" ] || [ "${{ steps.filter.outputs.ruby }}" = "true" ]; then
            echo "build_ruby=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_ruby=false" >> "$GITHUB_OUTPUT"
          fi
          
          if [ "$BUILD_ALL" = "true" ] || [ "${{ steps.filter.outputs.nvim }}" = "true" ]; then
            echo "build_debian=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_debian=false" >> "$GITHUB_OUTPUT"
          fi

  alpine_version:
    name: Resolve Alpine version
    needs: detect
    if: ${{ fromJSON(needs.detect.outputs.alpine_images)[0] != null }}
    uses: ./.github/workflows/reusable-alpine-version.yml

  alpine:
    name: Build ${{ matrix.image_name }}
    if: ${{ fromJSON(needs.detect.outputs.alpine_images)[0] != null && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs: [detect, alpine_version]
    strategy:
      fail-fast: false
      matrix:
        image_name: ${{ fromJSON(needs.detect.outputs.alpine_images) }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: ${{ matrix.image_name }}
      alpine_version: ${{ needs.alpine_version.outputs.alpine_version }}
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit

  ruby:
    name: Build ruby
    if: ${{ needs.detect.outputs.build_ruby == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs: detect
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-ruby-image.yml
    with:
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit

  debian:
    name: Build nvim
    if: ${{ needs.detect.outputs.build_debian == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs: detect
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-debian-image.yml
    with:
      image_name: nvim
      debian_tag: trixie-debian13
      release_tag: '13'
      publish: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit
