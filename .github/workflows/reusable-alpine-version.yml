name: Reusable Alpine version lookup

on:
  workflow_call:
    outputs:
      alpine_version:
        description: Previous stable Alpine version
        value: ${{ jobs.resolve.outputs.alpine_version }}

jobs:
  resolve:
    name: Discover previous stable Alpine
    runs-on: ubuntu-latest
    outputs:
      alpine_version: ${{ steps.fetch_version.outputs.previous_stable_alpine }}
    steps:
      - id: fetch_version
        name: Fetch Previous Stable Alpine Version
        run: |
          alpine_version="$(
            curl -fsSL \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 2 \
              --connect-timeout 10 \
              https://dl-cdn.alpinelinux.org/alpine/latest-stable/releases/x86_64/latest-releases.yaml |
            awk '/^  branch: v[0-9]+\.[0-9]+$/ { gsub(/^  branch: v/, "", $0); split($0, v, "."); printf "%s.%d\n", v[1], v[2] - 1; exit }'
          )"
          echo "$alpine_version" | grep -Eq '^[0-9]+\.[0-9]+$'
          echo "Previous stable Alpine version: $alpine_version"
          echo "previous_stable_alpine=$alpine_version" >> "$GITHUB_OUTPUT"
