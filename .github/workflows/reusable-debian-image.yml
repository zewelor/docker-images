name: Reusable debian image build

on:
  workflow_call:
    inputs:
      image_name:
        description: Image directory name
        required: true
        type: string
      debian_tag:
        description: DHI Debian tag to build against
        required: true
        type: string
      release_tag:
        description: Human-friendly Debian release tag used in published tags
        required: true
        type: string
      default_git_user_name:
        description: Default Git user.name baked into the image
        required: false
        default: ''
        type: string
      default_git_user_email:
        description: Default Git user.email baked into the image
        required: false
        default: ''
        type: string
      publish:
        description: Push image to registry
        required: false
        default: false
        type: boolean
      use_cache:
        description: Use Docker cache
        required: false
        default: true
        type: boolean
      cache_qemu:
        description: Cache binfmt image to avoid Docker Hub pulls
        required: false
        default: true
        type: boolean


permissions: {}

env:
  DOCKER_BUILD_CHECKS_ANNOTATIONS: false

jobs:
  build:
    name: Build ${{ inputs.image_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.image_name }}/Dockerfile
          ignore: DL3008
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,enable=true,priority=200,prefix=,suffix=,value=debian-${{ inputs.release_tag }}
            type=raw,enable=true,priority=300,prefix=,suffix=,value=latest
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          # Disable binfmt cache for parallel full rebuilds to avoid cache-key races.
          cache-image: ${{ inputs.cache_qemu }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to dhi.io
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          max_attempts: 3
          command: |
            echo "${{ secrets.DOCKER_DHI_TOKEN }}" | docker login dhi.io -u "${{ secrets.DOCKER_DHI_USERNAME }}" --password-stdin
      - name: Build local image for smoke testing
        uses: docker/build-push-action@v7
        with:
          pull: true
          load: true
          context: ${{ inputs.image_name }}/
          build-args: |
            DHI_DEBIAN_TAG=${{ inputs.debian_tag }}
            DEFAULT_GIT_USER_NAME=${{ inputs.default_git_user_name }}
            DEFAULT_GIT_USER_EMAIL=${{ inputs.default_git_user_email }}
          tags: test-image:latest
          cache-from: ${{ inputs.use_cache && format('type=gha,scope={0}', inputs.image_name) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}
      - name: Run smoke test
        run: ./${{ inputs.image_name }}/smoke-test.sh test-image:latest
      - name: Login to GitHub Container Registry
        if: ${{ inputs.publish }}
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          max_attempts: 3
          command: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: ${{ inputs.publish }}
          context: ${{ inputs.image_name }}/
          build-args: |
            DHI_DEBIAN_TAG=${{ inputs.debian_tag }}
            DEFAULT_GIT_USER_NAME=${{ inputs.default_git_user_name }}
            DEFAULT_GIT_USER_EMAIL=${{ inputs.default_git_user_email }}
          cache-from: ${{ inputs.use_cache && format('type=gha,scope={0}', inputs.image_name) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
      - name: Generate build attestation
        if: ${{ inputs.publish }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
