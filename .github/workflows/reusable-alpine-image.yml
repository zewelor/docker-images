name: Reusable alpine image build

on:
  workflow_call:
    inputs:
      image_name:
        description: Image directory name
        required: true
        type: string
      publish:
        description: Push image to registry
        required: false
        default: false
        type: boolean
      use_cache:
        description: Use Docker cache
        required: false
        default: true
        type: boolean


permissions: {}

env:
  DOCKER_BUILD_CHECKS_ANNOTATIONS: false

jobs:
  build:
    name: Build ${{ inputs.image_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      TEST_TAG: ${{ github.repository_owner }}/${{ inputs.image_name }}:test
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: Resolve Alpine version from Dockerfile
        id: alpine_version
        run: |
          VERSION=$(awk -F= '/^ARG ALPINE_VERSION/ {gsub(/[" ]/, "", $2); print $2}' "${{ inputs.image_name }}/Dockerfile")
          if [ -z "$VERSION" ]; then
            VERSION="3.22"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.image_name }}/Dockerfile
          ignore: DL3018
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            # full length sha
            type=sha,format=long,prefix=
            type=raw,enable=true,priority=200,prefix=,suffix=,value=alpine-${{ steps.alpine_version.outputs.version }}
          flavor: |
            latest=true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to dhi.io
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          max_attempts: 3
          command: |
            echo "${{ secrets.DOCKER_DHI_TOKEN }}" | docker login dhi.io -u "${{ secrets.DOCKER_DHI_USERNAME }}" --password-stdin
      - name: Build local image for smoke testing
        if: ${{ hashFiles(format('{0}/smoke-test.sh', inputs.image_name)) != '' }}
        uses: docker/build-push-action@v7
        with:
          pull: true
          load: true
          context: ${{ inputs.image_name }}/
          build-args: |
            ALPINE_VERSION=${{ steps.alpine_version.outputs.version }}
          tags: test-image:latest
          cache-from: ${{ inputs.use_cache && format('type=gha,scope={0}', inputs.image_name) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}
      - name: Run smoke test
        if: ${{ hashFiles(format('{0}/smoke-test.sh', inputs.image_name)) != '' }}
        run: |
          chmod +x "./${{ inputs.image_name }}/smoke-test.sh"
          "./${{ inputs.image_name }}/smoke-test.sh"
      - name: Login to GitHub Container Registry
        if: ${{ inputs.publish }}

        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: ${{ inputs.publish }}
          context: ${{ inputs.image_name }}/
          build-args: |
            ALPINE_VERSION=${{ steps.alpine_version.outputs.version }}
          cache-from: ${{ inputs.use_cache && format('type=gha,scope={0}', inputs.image_name) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
      - name: Generate build attestation
        if: ${{ inputs.publish }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
