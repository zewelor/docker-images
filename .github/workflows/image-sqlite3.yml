name: Build sqlite3 image

on:
  workflow_dispatch:
    inputs:
      use_cache:
        description: Use Docker cache
        type: boolean
        default: true
  pull_request:
    types: [opened, synchronize, reopened]
    paths: &image_paths
      - 'sqlite3/**'
      - '!sqlite3/**/*.md'
      - '!sqlite3/justfile'
      - '.github/workflows/image-sqlite3.yml'
      - '.github/workflows/reusable-alpine-image.yml'
  push:
    branches:
      - main
      - 'renovate/**'
    paths: *image_paths

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    name: Build and publish
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: sqlite3
      publish: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
    secrets: inherit
