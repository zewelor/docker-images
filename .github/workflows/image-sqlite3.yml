name: Build sqlite3

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'sqlite3/**'
      - '!**/*.md'
      - '!**/Justfile'
  push:
    branches:
      - main
      - 'renovate/**'
    paths:
      - 'sqlite3/**'
      - '!**/*.md'
      - '!**/Justfile'

jobs:
  latest-alpine:
    name: Discover previous stable Alpine
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.fetch_version.outputs.previous_stable_alpine }}
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - id: fetch_version
        name: Fetch Previous Stable Alpine Version
        run: |
          alpine_version="$(./scripts/get_previous_stable_alpine.sh)"
          echo "$alpine_version" | grep -Eq '^[0-9]+\.[0-9]+$'
          echo "Previous stable Alpine version: $alpine_version"
          echo "previous_stable_alpine=$alpine_version" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: latest-alpine
    uses: ./.github/workflows/reusable-alpine-image.yml
    with:
      image_name: sqlite3
      alpine_version: ${{ needs.latest-alpine.outputs.version }}
      publish: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
